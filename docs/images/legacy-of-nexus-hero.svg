<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Legacy of Nexus Hero Banner</title>
  <desc id="desc">Stylized landscape with a cute dinosaur companion silhouette at sunset.</desc>
  <defs>
